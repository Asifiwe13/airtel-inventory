# =====================================================
# PRODUCTION CLOUD - MYSQL (AWS/DigitalOcean/Azure)
# =====================================================

spring.application.name=airtel-inventory
server.port=8080

# Database - Cloud MySQL (Set environment variables)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Production Settings
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Performance optimization
spring.jpa.properties.hibernate.jdbc.batch_size=30
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool (Optimized for production)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.pool-name=AirtelHikariPool

# Thymeleaf (Cache enabled)
spring.thymeleaf.cache=true

# File Storage (Cloud volume or S3)
app.qr.storage.path=${QR_STORAGE_PATH:/var/data/airtel_inventory/qrcodes}
app.reports.storage.path=${REPORT_STORAGE_PATH:/var/data/airtel_inventory/reports}

# Email Configuration (Use environment variables for security)
app.email.enabled=true
app.email.admin=${ADMIN_EMAIL:admin@airtel.com}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=fabriceasifiwe663@gmail.com
spring.mail.password=dpilynygnvayjpcr
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Security (Use strong passwords in production)
spring.security.user.name=${ADMIN_USER:admin}
spring.security.user.password=${ADMIN_PASSWORD}

# Cache
spring.cache.type=simple
spring.cache.cache-names=devices,employees

# Health Monitoring
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true

# Logging
logging.level.com.airtel.inventory=INFO
logging.level.org.springframework.web=WARN
logging.file.path=/var/log/airtel-inventory

# Session Management
server.servlet.session.timeout=30m
server.error.whitelabel.enabled=false

# CORS (Allow your domain)
app.cors.allowed-origins=${CORS_ORIGINS:https://yourdomain.com}