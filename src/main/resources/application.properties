# =====================================================
# LOCAL DEVELOPMENT - XAMPP MYSQL
# =====================================================

spring.application.name=airtel-inventory
server.port=8080

# Database - XAMPP MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/airtel_inventory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# Thymeleaf
spring.thymeleaf.cache=false

# File Storage (Windows path)
app.qr.storage.path=C:/airtel_inventory/qrcodes
app.reports.storage.path=C:/airtel_inventory/reports

# Logging
logging.level.com.airtel.inventory=DEBUG

# Security (Local)
spring.security.user.name=admin
spring.security.user.password=admin123

# Email (Disabled for local testing)
app.email.enabled=false