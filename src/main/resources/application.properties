spring.application.name=airtel-inventory
server.port=8080

# MySQL - Local Development
spring.datasource.url=jdbc:mysql://localhost:3306/airtel_inventory?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=false

# File Storage
app.qr.storage.path=/tmp/qrcodes
app.reports.storage.path=/tmp/reports

# Security
spring.security.user.name=admin
spring.security.user.password=admin123

# Email - DISABLED locally
app.email.enabled=false

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true