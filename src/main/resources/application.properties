# Simple working configuration - NO PostgreSQL needed!
spring.application.name=airtel-inventory
server.port=8080

# H2 Database - No external database needed!
spring.datasource.url=jdbc:h2:file:./data/airtel_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Thymeleaf
spring.thymeleaf.cache=true

# File Storage
app.qr.storage.path=/tmp/qrcodes
app.reports.storage.path=/tmp/reports

# Security
spring.security.user.name=admin
spring.security.user.password=admin123

# Email disabled
app.email.enabled=false

# Health check
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true