<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: body">
    <div th:fragment="content">
        <div class="max-w-2xl mx-auto">
            <h1 class="text-2xl font-bold mb-2"><i class="fas fa-plus-circle text-red-600 mr-2"></i>Register Device</h1>
            <p class="text-gray-500 text-sm mb-6">Add new device to inventory system</p>
            
            <!-- Error Message Display -->
            <div id="errorMessage" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-4 rounded">
                <p id="errorText"></p>
            </div>
            
            <div class="bg-white rounded-xl shadow-md p-6">
                <form id="deviceForm">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Asset Tag *</label>
                            <input type="text" id="assetTag" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Serial Number *</label>
                            <input type="text" id="serialNumber" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Device Type *</label>
                            <select id="deviceType" required class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                                <option value="">Select type</option>
                                <option th:each="type : ${deviceTypes}" th:value="${type}" th:text="${type}"></option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Brand</label>
                            <input type="text" id="brand" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Model</label>
                            <input type="text" id="model" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Purchase Date</label>
                            <input type="date" id="purchaseDate" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Warranty End Date</label>
                            <input type="date" id="warrantyEnd" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Cost (₹)</label>
                            <input type="number" id="cost" step="0.01" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-sm font-medium mb-1">Specifications</label>
                            <textarea id="specifications" rows="3" class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-red-500" 
                                      placeholder="RAM, Storage, Processor, etc."></textarea>
                        </div>
                    </div>
                    
                    <div class="flex justify-end space-x-3 mt-6 pt-4 border-t">
                        <a href="/devices" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Cancel</a>
                        <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
                            Register Device
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('deviceForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Clear previous error
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.classList.add('hidden');
        
        // Collect form data
        const data = {
            assetTag: document.getElementById('assetTag').value,
            serialNumber: document.getElementById('serialNumber').value,
            deviceType: document.getElementById('deviceType').value,
            brand: document.getElementById('brand').value || null,
            model: document.getElementById('model').value || null,
            purchaseDate: document.getElementById('purchaseDate').value || null,
            warrantyEnd: document.getElementById('warrantyEnd').value || null,
            cost: document.getElementById('cost').value ? parseFloat(document.getElementById('cost').value) : null,
            specifications: document.getElementById('specifications').value || null
        };
        
        // Validate required fields
        if (!data.assetTag || !data.serialNumber || !data.deviceType) {
            showError('Please fill in all required fields (*)');
            return;
        }
        
        try {
            const response = await fetch('/api/devices', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });
            
            if (response.ok) {
                const result = await response.json();
                console.log('Device registered:', result);
                window.location.href = '/devices';
            } else {
                const error = await response.text();
                console.error('Server error:', error);
                showError('Failed to register device: ' + error);
            }
        } catch (error) {
            console.error('Network error:', error);
            showError('Network error - Could not connect to server');
        }
    });
    
    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        errorText.textContent = message;
        errorDiv.classList.remove('hidden');
        
        // Scroll to error message
        errorDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        
        // Hide after 5 seconds
        setTimeout(() => {
            errorDiv.classList.add('hidden');
        }, 5000);
    }
</script>
</body>
</html>
