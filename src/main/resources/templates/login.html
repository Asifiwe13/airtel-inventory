<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Airtel Inventory - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="w-full max-w-md">

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8 mb-4">
            <div class="text-center mb-8">
                <div class="bg-red-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-server text-white text-3xl"></i>
                </div>
                <h2 class="text-3xl font-bold text-gray-800">Airtel Inventory</h2>
                <p class="text-gray-500 mt-1 text-sm">End User Equipment Management System</p>
            </div>

            <!-- Error Message -->
            <div th:if="${param.error}" class="bg-red-50 border-l-4 border-red-500 text-red-700 p-3 rounded mb-4 text-sm">
                <i class="fas fa-exclamation-triangle mr-2"></i>Invalid username or password.
            </div>

            <!-- Logout Message -->
            <div th:if="${param.logout}" class="bg-green-50 border-l-4 border-green-500 text-green-700 p-3 rounded mb-4 text-sm">
                <i class="fas fa-check-circle mr-2"></i>You have been logged out successfully.
            </div>

            <form action="/login" method="post">
                <div class="mb-5">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">
                        <i class="fas fa-user mr-1 text-red-600"></i>Username
                    </label>
                    <input type="text" name="username" required autofocus
                           placeholder="Enter your username"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-sm font-semibold mb-2">
                        <i class="fas fa-lock mr-1 text-red-600"></i>Password
                    </label>
                    <input type="password" name="password" required
                           placeholder="Enter your password"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500 focus:border-transparent transition">
                </div>
                <button type="submit"
                        class="w-full bg-red-600 hover:bg-red-700 text-white py-3 rounded-lg font-semibold transition shadow-md">
                    <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                </button>
            </form>
        </div>

        <!-- Developer Credits -->
        <div class="bg-white/10 backdrop-blur rounded-xl p-4 text-center text-white">
            <p class="text-xs text-white/70 mb-2">
                <i class="fas fa-code mr-1"></i>Developed by
            </p>
            <p class="font-semibold text-sm">NDARUHUTSE ASIFIWE Fabrice</p>
            <p class="text-white/50 text-xs my-1">&</p>
            <p class="font-semibold text-sm">IRADUKUNDA Vivance</p>
            <p class="text-white/60 text-xs mt-2">© 2024 Airtel Inventory Management System</p>
        </div>

    </div>
</body>
</html>
