<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: body">
    <div th:fragment="content">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold"><i class="fas fa-users text-red-600 mr-2"></i>All Employees</h1>
                <p class="text-gray-500 text-sm mt-1">Manage employee records</p>
            </div>
            <a href="/employees/register" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition">
                <i class="fas fa-user-plus mr-2"></i>Add Employee
            </a>
        </div>
        
        <!-- Search Bar -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6">
            <input type="text" id="searchEmployees" placeholder="Search by name, ID, department..." 
                   class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>
        
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Name</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Department</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Designation</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Phone</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="employeesTableBody">
                        <tr th:each="emp : ${employees}" class="border-t hover:bg-gray-50">
                            <td class="px-6 py-3 text-sm font-mono" th:text="${emp.id}">-</td>
                            <td class="px-6 py-3 text-sm font-medium" th:text="${emp.name}">-</td>
                            <td class="px-6 py-3 text-sm" th:text="${emp.department}">-</td>
                            <td class="px-6 py-3 text-sm" th:text="${emp.designation}">-</td>
                            <td class="px-6 py-3 text-sm" th:text="${emp.email}">-</td>
                            <td class="px-6 py-3 text-sm" th:text="${emp.phone}">-</td>
                            <td class="px-6 py-3">
                                <button th:data-id="${emp.id}" th:data-name="${emp.name}" onclick="deleteEmployee(this)" 
                                        class="delete-btn text-red-600 hover:text-red-800 transition">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Empty State -->
        <div th:if="${employees.isEmpty()}" class="bg-white rounded-xl shadow-md p-12 text-center">
            <i class="fas fa-users text-gray-300 text-6xl mb-4"></i>
            <p class="text-gray-500">No employees found. Click "Add Employee" to get started.</p>
        </div>
    </div>
</div>

<script>
    // Search functionality
    document.getElementById('searchEmployees').addEventListener('keyup', function() {
        let filter = this.value.toLowerCase();
        let rows = document.querySelectorAll('#employeesTableBody tr');
        rows.forEach(row => {
            let text = row.textContent.toLowerCase();
            row.style.display = text.includes(filter) ? '' : 'none';
        });
    });
    
    // Delete employee function with better error handling
    async function deleteEmployee(button) {
        const employeeId = button.getAttribute('data-id');
        const employeeName = button.getAttribute('data-name');
        
        // First check if employee has active assignments via API
        try {
            const checkResponse = await fetch(`/api/employees/${employeeId}/has-assignments`);
            if (checkResponse.ok) {
                const hasAssignments = await checkResponse.json();
                if (hasAssignments) {
                    showNotification(
                        `Cannot delete "${employeeName}" - This employee has active device assignments. Please return all devices first.`, 
                        'error'
                    );
                    return;
                }
            }
        } catch (error) {
            // Continue with delete attempt anyway
        }
        
        const confirmMessage = `Are you sure you want to delete employee "${employeeName}"?\n\nThis will also remove all assignment history for this employee.`;
        
        if (confirm(confirmMessage)) {
            try {
                const response = await fetch('/api/employees/' + employeeId, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                if (response.ok) {
                    showNotification(`Employee "${employeeName}" deleted successfully!`, 'success');
                    setTimeout(() => location.reload(), 1500);
                } else {
                    const errorText = await response.text();
                    showNotification(errorText, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showNotification('Error deleting employee: ' + error.message, 'error');
            }
        }
    }
    
    function showNotification(message, type) {
        const notification = document.createElement('div');
        notification.className = `fixed top-20 right-4 z-50 px-6 py-3 rounded-lg shadow-lg transition-all duration-300 ${
            type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'
        }`;
        notification.innerHTML = `
            <div class="flex items-center">
                <i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'} mr-2"></i>
                <span>${message}</span>
            </div>
        `;
        document.body.appendChild(notification);
        
        setTimeout(() => {
            notification.style.opacity = '0';
            setTimeout(() => notification.remove(), 300);
        }, 5000);
    }
</script>
</body>
</html>
