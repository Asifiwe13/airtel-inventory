<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout :: head"></head>
<body>
<div th:replace="layout :: body">
    <div th:fragment="content">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h1 class="text-2xl font-bold"><i class="fas fa-laptop text-red-600 mr-2"></i>All Devices</h1>
                <p class="text-gray-500 text-sm mt-1">Manage and track all registered devices</p>
            </div>
            <a href="/devices/register" class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-lg transition">
                <i class="fas fa-plus mr-2"></i>Register Device
            </a>
        </div>
        
        <!-- Search and Filter Bar -->
        <div class="bg-white rounded-xl shadow-md p-4 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                    <input type="text" id="searchDevices" placeholder="Search by asset tag, serial, brand..." 
                           class="w-full pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                </div>
                <select id="typeFilter" class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                    <option value="">All Types</option>
                    <option value="LAPTOP">💻 Laptop</option>
                    <option value="DESKTOP">🖥️ Desktop</option>
                    <option value="MOBILE">📱 Mobile</option>
                    <option value="TABLET">📟 Tablet</option>
                </select>
                <select id="statusFilter" class="px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-red-500">
                    <option value="">All Status</option>
                    <option value="AVAILABLE">✅ Available</option>
                    <option value="ASSIGNED">📌 Assigned</option>
                    <option value="UNDER_REPAIR">🔧 Under Repair</option>
                </select>
            </div>
        </div>
        
        <!-- Devices Table -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead class="bg-gray-50">
                        <tr>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Asset Tag</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Brand/Model</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Serial Number</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Health</th>
                            <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="devicesTableBody">
                        <tr th:each="device : ${devices}" class="border-t hover:bg-gray-50 transition">
                            <td class="px-6 py-4 text-sm font-mono font-medium text-gray-900" th:text="${device.assetTag}">-</td>
                            <td class="px-6 py-4">
                                <span th:if="${device.deviceType == 'LAPTOP'}" class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800">
                                    <i class="fas fa-laptop"></i> Laptop
                                </span>
                                <span th:if="${device.deviceType == 'DESKTOP'}" class="px-2 py-1 text-xs rounded-full bg-purple-100 text-purple-800">
                                    <i class="fas fa-desktop"></i> Desktop
                                </span>
                                <span th:if="${device.deviceType == 'MOBILE'}" class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-800">
                                    <i class="fas fa-mobile-alt"></i> Mobile
                                </span>
                                <span th:if="${device.deviceType == 'TABLET'}" class="px-2 py-1 text-xs rounded-full bg-yellow-100 text-yellow-800">
                                    <i class="fas fa-tablet-alt"></i> Tablet
                                </span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="text-sm font-medium text-gray-900" th:text="${device.brand}">-</div>
                                <div class="text-xs text-gray-500" th:text="${device.model}">-</div>
                            </td>
                            <td class="px-6 py-4 text-sm text-gray-600 font-mono" th:text="${device.serialNumber}">-</td>
                            <td class="px-6 py-4">
                                <span th:if="${device.currentStatus == 'AVAILABLE'}" class="px-2 py-1 text-xs rounded-full bg-green-100 text-green-800">
                                    <i class="fas fa-check-circle"></i> Available
                                </span>
                                <span th:if="${device.currentStatus == 'ASSIGNED'}" class="px-2 py-1 text-xs rounded-full bg-blue-100 text-blue-800">
                                    <i class="fas fa-user-check"></i> Assigned
                                </span>
                                <span th:if="${device.currentStatus == 'UNDER_REPAIR'}" class="px-2 py-1 text-xs rounded-full bg-yellow-100 text-yellow-800">
                                    <i class="fas fa-tools"></i> Under Repair
                                </span>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex items-center space-x-2">
                                    <div class="w-16 bg-gray-200 rounded-full h-2">
                                        <div class="rounded-full h-2" 
                                             th:class="${device.healthScore >= 70 ? 'bg-green-500' : (device.healthScore >= 40 ? 'bg-yellow-500' : 'bg-red-500')}"
                                             th:style="'width:' + ${device.healthScore} + '%'"></div>
                                    </div>
                                    <span class="text-xs font-medium" 
                                          th:class="${device.healthScore >= 70 ? 'text-green-600' : (device.healthScore >= 40 ? 'text-yellow-600' : 'text-red-600')}"
                                          th:text="${device.healthScore} + '%'"></span>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <div class="flex space-x-2">
                                    <button th:data-id="${device.id}" onclick="viewDevice(this)" 
                                            class="text-blue-600 hover:text-blue-800 transition">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <button th:data-id="${device.id}" onclick="deleteDevice(this)" 
                                            class="text-red-600 hover:text-red-800 transition">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                    <!-- ✅ Print Label Button - INSIDE ACTIONS COLUMN -->
                                    <button th:data-id="${device.id}" th:data-tag="${device.assetTag}" onclick="printLabel(this)" 
                                            class="text-green-600 hover:text-green-800 transition">
                                        <i class="fas fa-print"></i>
                                    </button>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- Empty State -->
        <div th:if="${devices.isEmpty()}" class="bg-white rounded-xl shadow-md p-12 text-center">
            <i class="fas fa-laptop text-gray-300 text-6xl mb-4"></i>
            <p class="text-gray-500">No devices found. Click "Register Device" to get started.</p>
        </div>
    </div>
</div>

<!-- Device Details Modal -->
<div id="deviceModal" class="fixed inset-0 bg-gray-600 bg-opacity-50 hidden overflow-y-auto h-full w-full z-50">
    <div class="relative top-20 mx-auto p-5 border w-full max-w-2xl shadow-lg rounded-xl bg-white">
        <div class="flex justify-between items-center mb-4 pb-3 border-b">
            <h3 class="text-xl font-semibold text-gray-800">
                <i class="fas fa-info-circle text-red-600 mr-2"></i>Device Details
            </h3>
            <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600">
                <i class="fas fa-times text-xl"></i>
            </button>
        </div>
        <div id="deviceDetailsContent" class="space-y-4">
            <!-- Dynamic content loaded via JavaScript -->
        </div>
        <div class="mt-6 pt-3 border-t flex justify-end">
            <button onclick="closeModal()" class="px-4 py-2 bg-gray-500 text-white rounded-lg hover:bg-gray-600">
                Close
            </button>
        </div>
    </div>
</div>

<script>
function printLabel(button) {
    const assetTag = button.getAttribute('data-tag');
    
    // Open print window with barcode
    const printWindow = window.open('', '_blank');
    printWindow.document.write(`
        <!DOCTYPE html>
        <html>
        <head>
            <title>Device Label - ${assetTag}</title>
            <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"><\/script>
            <style>
                body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: white; }
                .label { width: 300px; padding: 20px; border: 1px solid #ccc; border-radius: 10px; text-align: center; }
                .logo { color: #dc2626; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
                .barcode { margin: 15px 0; }
                .tag { font-size: 16px; font-weight: bold; letter-spacing: 2px; margin: 10px 0; }
                .info { font-size: 12px; color: #666; margin: 5px 0; }
                .footer { font-size: 10px; color: #999; margin-top: 15px; }
                @media print {
                    body { margin: 0; padding: 0; }
                    .label { border: none; }
                }
            </style>
        </head>
        <body>
            <div class="label">
                <div class="logo">AIRTEL INVENTORY</div>
                <svg id="barcode"></svg>
                <div class="tag">${assetTag}</div>
                <div class="info">Scan to track this device</div>
                <div class="info">http://localhost:8080/track</div>
                <div class="footer">Airtel Inventory System</div>
            </div>
            <script>
                JsBarcode("#barcode", "${assetTag}", {
                    format: "CODE128",
                    width: 2,
                    height: 80,
                    displayValue: false,
                    margin: 0
                });
                setTimeout(() => window.print(), 500);
            <\/script>
        </body>
        </html>
    `);
}

// Search functionality
function filterTable() {
    const searchTerm = document.getElementById('searchDevices').value.toLowerCase();
    const typeFilter = document.getElementById('typeFilter').value;
    const statusFilter = document.getElementById('statusFilter').value;
    const rows = document.querySelectorAll('#devicesTableBody tr');
    
    rows.forEach(row => {
        const text = row.textContent.toLowerCase();
        const type = row.querySelector('td:nth-child(2)').textContent;
        const status = row.querySelector('td:nth-child(5)').textContent;
        
        const matchesSearch = text.includes(searchTerm);
        const matchesType = !typeFilter || type.includes(typeFilter);
        const matchesStatus = !statusFilter || status.includes(statusFilter);
        
        row.style.display = matchesSearch && matchesType && matchesStatus ? '' : 'none';
    });
}

document.getElementById('searchDevices').addEventListener('keyup', filterTable);
document.getElementById('typeFilter').addEventListener('change', filterTable);
document.getElementById('statusFilter').addEventListener('change', filterTable);

// View device details
async function viewDevice(button) {
    const deviceId = button.getAttribute('data-id');
    
    try {
        const response = await fetch('/api/devices/' + deviceId);
        if (response.ok) {
            const device = await response.json();
            showDeviceDetails(device);
        } else {
            showNotification('Error loading device details', 'error');
        }
    } catch (error) {
        console.error('Error:', error);
        showNotification('Error loading device details', 'error');
    }
}

function showDeviceDetails(device) {
    const content = document.getElementById('deviceDetailsContent');
    content.innerHTML = `
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-gray-50 p-3 rounded-lg">
                <label class="text-xs text-gray-500">Asset Tag</label>
                <p class="font-mono font-semibold">${device.assetTag || '-'}</p>
            </div>
            <div class="bg-gray-50 p-3 rounded-lg">
                <label class="text-xs text-gray-500">Serial Number</label>
                <p class="font-mono">${device.serialNumber || '-'}</p>
            </div>
            <div class="bg-gray-50 p-3 rounded-lg">
                <label class="text-xs text-gray-500">Device Type</label>
                <p>${device.deviceType || '-'}</p>
            </div>
            <div class="bg-gray-50 p-3 rounded-lg">
                <label class="text-xs text-gray-500">Brand / Model</label>
                <p>${device.brand || '-'} ${device.model || ''}</p>
            </div>
            <div class="bg-gray-50 p-3 rounded-lg">
                <label class="text-xs text-gray-500">Status</label>
                <p><span class="px-2 py-1 text-xs rounded-full ${
                    device.currentStatus === 'AVAILABLE' ? 'bg-green-100 text-green-800' :
                    device.currentStatus === 'ASSIGNED' ? 'bg-blue-100 text-blue-800' :
                    'bg-yellow-100 text-yellow-800'
                }">${device.currentStatus || '-'}</span></p>
            </div>
            <div class="bg-gray-50 p-3 rounded-lg">
                <label class="text-xs text-gray-500">Health Score</label>
                <div class="flex items-center mt-1">
                    <div class="w-24 bg-gray-200 rounded-full h-2 mr-2">
                        <div class="rounded-full h-2 ${device.healthScore >= 70 ? 'bg-green-500' : (device.healthScore >= 40 ? 'bg-yellow-500' : 'bg-red-500')}" 
                             style="width: ${device.healthScore}%"></div>
                    </div>
                    <span class="text-sm font-medium">${device.healthScore}%</span>
                </div>
            </div>
            <div class="bg-gray-50 p-3 rounded-lg">
                <label class="text-xs text-gray-500">Purchase Date</label>
                <p>${device.purchaseDate || '-'}</p>
            </div>
            <div class="bg-gray-50 p-3 rounded-lg">
                <label class="text-xs text-gray-500">Warranty End</label>
                <p>${device.warrantyEnd || '-'}</p>
            </div>
            <div class="bg-gray-50 p-3 rounded-lg">
                <label class="text-xs text-gray-500">Cost</label>
                <p class="font-semibold">${device.cost ? '₹' + device.cost.toLocaleString() : '-'}</p>
            </div>
            <div class="bg-gray-50 p-3 rounded-lg col-span-2">
                <label class="text-xs text-gray-500">Specifications</label>
                <p class="text-sm">${device.specifications || 'No specifications provided'}</p>
            </div>
        </div>
    `;
    document.getElementById('deviceModal').classList.remove('hidden');
}

function closeModal() {
    document.getElementById('deviceModal').classList.add('hidden');
}

// Delete device function
function deleteDevice(button) {
    const deviceId = button.getAttribute('data-id');
    
    if (confirm('Are you sure you want to delete this device?\n\nThis action cannot be undone.')) {
        fetch('/api/devices/' + deviceId, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(response => {
            if (response.ok) {
                showNotification('Device deleted successfully!', 'success');
                setTimeout(() => location.reload(), 1000);
            } else {
                throw new Error('Failed to delete device');
            }
        })
        .catch(error => {
            console.error('Error:', error);
            showNotification('Error deleting device', 'error');
        });
    }
}

function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `fixed top-20 right-4 z-50 px-6 py-3 rounded-lg shadow-lg transition-all duration-300 ${
        type === 'success' ? 'bg-green-500 text-white' : 'bg-red-500 text-white'
    }`;
    notification.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-triangle'} mr-2"></i>${message}`;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.style.opacity = '0';
        setTimeout(() => notification.remove(), 300);
    }, 3000);
}

// Close modal when clicking outside
document.getElementById('deviceModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
</script>
</body>
</html>
