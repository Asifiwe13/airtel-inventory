spring.application.name=airtel-inventory
server.port=${PORT:8080}

# Database - Render PostgreSQL (fix URL format)
spring.datasource.url=jdbc:postgresql://${PGHOST}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Thymeleaf
spring.thymeleaf.cache=true

# File Storage
app.qr.storage.path=/tmp/qrcodes
app.reports.storage.path=/tmp/reports

# Security
spring.security.user.name=admin
spring.security.user.password=${ADMIN_PASSWORD:admin123}

# Email disabled
app.email.enabled=false

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
