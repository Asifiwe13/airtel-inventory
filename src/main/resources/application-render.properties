# =====================================================
# RENDER DEPLOYMENT - POSTGRESQL
# =====================================================

spring.application.name=airtel-inventory
server.port=8080

# Database - Render PostgreSQL (Environment variables provided by Render)
spring.datasource.url=${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool (Optimized for free tier)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# Thymeleaf (Cache enabled for production)
spring.thymeleaf.cache=true

# File Storage (Render uses ephemeral storage)
app.qr.storage.path=/tmp/qrcodes
app.reports.storage.path=/tmp/reports

# Logging
logging.level.com.airtel.inventory=INFO
logging.level.org.springframework.web=WARN

# Security
spring.security.user.name=admin
spring.security.user.password=admin123

# Email (Disabled on free tier - enables later)
app.email.enabled=false

# Performance tuning for 512MB RAM
server.tomcat.threads.max=10
spring.jpa.properties.hibernate.jdbc.batch_size=5

# Health checks for Render
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized
management.endpoint.health.probes.enabled=true