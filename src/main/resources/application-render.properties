spring.application.name=airtel-inventory
server.port=8080

# Database - Render PostgreSQL
spring.datasource.url=jdbc:${JDBC_DATABASE_URL}
spring.datasource.username=${JDBC_DATABASE_USERNAME}
spring.datasource.password=${JDBC_DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Connection Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# Thymeleaf
spring.thymeleaf.cache=true

# File Storage
app.qr.storage.path=/tmp/qrcodes
app.reports.storage.path=/tmp/reports

# Security
spring.security.user.name=admin
spring.security.user.password=${ADMIN_PASSWORD:admin123}

# Email disabled
app.email.enabled=false

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
